<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeSphere • Discover Your Next Obsession</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div class="logo">AnimeSphere</div>
            <nav>
                <button onclick="restartQuiz()" class="nav-btn">New Quiz</button>
            </nav>
        </header>

        <!-- Intro Screen -->
        <div id="intro-screen" class="screen active">
            <div class="hero">
                <h1>Find Your Next Favorite Anime</h1>
                <p>Answer 20 questions about your taste. We'll recommend 10 anime you'll love.</p>
                <button onclick="startQuiz()" class="cta-btn">Start the Quiz</button>
            </div>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="screen">
            <div class="progress-bar">
                <div id="progress" class="progress"></div>
            </div>
            <div class="question-container">
                <h2 id="question-text"></h2>
                <div id="options" class="options"></div>
            </div>
            <div class="quiz-controls">
                <button onclick="prevQuestion()" id="prev-btn" class="nav-btn" style="display:none;">Previous</button>
                <span id="question-counter"></span>
            </div>
        </div>

        <!-- Results Screen -->
        <div id="results-screen" class="screen">
            <h1>Your Anime Taste Profile</h1>
            <div id="taste-profile" class="taste-profile"></div>
            
            <h2>Recommended for You</h2>
            <div id="recommendations" class="recommendations-grid"></div>
            
            <div class="actions">
                <button onclick="restartQuiz()" class="cta-btn">Take Quiz Again</button>
                <button onclick="shareResults()" class="secondary-btn">Share Results</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
